{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm Login | Hangarin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-border: rgba(255, 255, 255, 0.125);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            margin: 0;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem 2.5rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .shield-icon {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
        }

        h3 {
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
        }

        .provider-highlight {
            color: #818cf8;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            padding: 0.8rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            opacity: 0.9;
        }

        .btn-outline-cancel {
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 0.8rem;
            font-weight: 500;
            border-radius: 12px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-outline-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: var(--text-dim);
        }

        .info-text {
            color: var(--text-dim);
            line-height: 1.6;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <i class="fas fa-shield-check shield-icon"></i>
        
        <h3>Confirm Sign In</h3>
        
        <p class="info-text mb-4">
            You are about to authorize your 
            <span class="provider-highlight">{{ provider.name }}</span> account 
            to access Hangarin.
        </p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="fas fa-check-circle me-2"></i>Continue to App
            </button>
        </form>
        
        <a href="{% url 'account_login' %}" class="btn btn-outline-cancel w-100">
            <i class="fas fa-arrow-left me-2"></i>Nevermind, go back
        </a>

        <div class="mt-4 pt-2 border-top border-secondary opacity-25" style="border-top-style: dashed !important;"></div>
        
        <p class="small text-muted mt-3 mb-0">
            <i class="fas fa-lock me-1"></i> Secure OAuth2 Connection
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
