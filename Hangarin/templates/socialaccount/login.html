{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', sans-serif;
        }
        .auth-card {
            max-width: 500px;
            background: rgba(20, 20, 20, 0.95);
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(0, 255, 200, 0.2);
            padding: 2rem;
            text-align: center;
            color: #e0f7fa;
            backdrop-filter: blur(10px);
        }
        .auth-card h3 {
            color: #00ffc8;
            font-weight: 600;
        }
        .text-primary {
            color: #00ffc8 !important;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00ffc8, #00bfa6);
            border: none;
            color: #003333;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #00e6b8, #00a896);
        }
        .btn-outline-secondary {
            border-color: #00ffc8;
            color: #00ffc8;
        }
        .btn-outline-secondary:hover {
            background-color: #00ffc8;
            color: #003333;
        }
        i {
            color: #00ffc8;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <i class="fas fa-shield-alt fa-3x mb-3"></i>
        <h3 class="mb-4">Confirm Sign In</h3>
        <p class="mb-4">
            You are about to sign in using your 
            <strong class="text-primary">{{ provider.name }}</strong> account.
        </p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="fas fa-check me-2"></i>Continue with {{ provider.name }}
            </button>
        </form>
        
        <a href="{% url 'account_login' %}" class="btn btn-outline-secondary w-100">
            <i class="fas fa-times me-2"></i>Cancel
        </a>
    </div>
</body>
</html>
