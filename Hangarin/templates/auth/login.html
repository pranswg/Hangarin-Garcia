<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hangarin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-border: rgba(255, 255, 255, 0.125);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 10px;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: var(--text-main);
        }

        .brand-icon {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }

        .form-label i {
            margin-right: 8px;
            color: #818cf8;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--glass-border) !important;
            color: #ffffff !important;
            padding: 0.75rem 1rem;
            border-radius: 12px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4) !important;
            opacity: 1;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            color: #ffffff !important;
        }

        input:-webkit-autofill {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            padding: 0.8rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            opacity: 0.9;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .form-check-input:checked {
            background-color: #6366f1;
            border-color: #6366f1;
        }

        .form-check-label {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .footer-note {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .info-tag {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.75rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-tasks brand-icon mb-3"></i>
                    <h3 class="fw-bold mb-1" style="letter-spacing: -1px;">Hangarin</h3>
                    <p class="text-dim small">Sign in to manage your productivity</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger d-flex align-items: center;" role="alert">
                    <i class="fas fa-exclamation-circle me-2 mt-1"></i>
                    <div>Invalid credentials. Please verify and try again.</div>
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">
                            <i class="fas fa-user-circle"></i>Username
                        </label>
                        <input type="text" 
                               class="form-control" 
                               id="id_username" 
                               name="username" 
                               required 
                               autofocus
                               placeholder="Enter your username">
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label">
                            <i class="fas fa-lock"></i>Password
                        </label>
                        <input type="password" 
                               class="form-control" 
                               id="id_password" 
                               name="password" 
                               required
                               placeholder="••••••••">
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Sign In <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="footer-note mb-0">
                        Don't have an account? <br>
                        <span style="color: #818cf8; cursor: pointer;">Contact your administrator.</span>
                    </p>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <div class="info-tag">
                <i class="fas fa-shield-alt me-1"></i>
                Superuser access enabled for this session
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
